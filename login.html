<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DisasterLink</title>
  <meta name="description" content="Login to DisasterLink as Admin or Volunteer to access the command center." />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- Command Bar -->
  <nav class="cmdbar">
    <div class="cmdbar-brand">
      <span class="brand-dot"></span>
      DISASTERLINK
    </div>
    <div class="cmdbar-nav">
      <a href="index.html" style="color:var(--text-secondary);font-weight:600;"><span class="nav-icon">⬅️</span> Back</a>
    </div>
  </nav>

  <div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
    <div class="auth-wrap glass-panel" style="padding:2.5rem;max-width:460px;width:100%;">

      <!-- Header -->
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-size:2.8rem;margin-bottom:0.5rem;filter:drop-shadow(0 0 12px rgba(59,130,246,0.4));">🔐</div>
        <h1 style="font-size:1.6rem;font-weight:800;letter-spacing:0.02em;">Command Center Login</h1>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.4rem;">Select your role to authenticate</p>
      </div>

      <!-- Role Selector -->
      <div class="role-tabs" id="roleTabs" style="display:flex;gap:0.5rem;margin-bottom:1.75rem;">
        <button class="role-tab active" id="tabAdmin" onclick="switchRole('admin')">
          <span style="font-size:1.1rem;">⚙️</span> Admin
        </button>
        <button class="role-tab" id="tabVolunteer" onclick="switchRole('volunteer')">
          <span style="font-size:1.1rem;">🤝</span> Volunteer
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate style="display:flex;flex-direction:column;gap:1.25rem;">
        <div class="form-group" style="margin:0;">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="loginUsername" autocomplete="username" required placeholder="Enter your username" />
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required placeholder="Enter your password" style="padding-right:3rem;" />
            <button type="button" id="eyeToggle" onclick="togglePasswordVisibility()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-secondary);padding:0.2rem;">👁</button>
          </div>
        </div>

        <div id="loginError" style="display:none;color:var(--danger);font-size:0.85rem;text-align:center;background:rgba(239,68,68,0.1);padding:0.75rem;border-radius:var(--radius-sm);border:1px solid rgba(239,68,68,0.2);"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" style="margin-top:0.25rem;font-size:1rem;">
          🔐 Login
        </button>
      </form>

      <!-- Volunteer register link -->
      <div id="volunteerRegisterLink" style="display:none;margin-top:1.5rem;text-align:center;font-size:0.87rem;color:var(--text-secondary);">
        New volunteer? <a href="volunteer_register.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Register here →</a>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>
  <script src="script.js?v=2"></script>
  <script>
    let selectedRole = 'admin';

    function switchRole(role) {
      selectedRole = role;
      document.getElementById('tabAdmin').classList.toggle('active', role === 'admin');
      document.getElementById('tabVolunteer').classList.toggle('active', role === 'volunteer');
      document.getElementById('volunteerRegisterLink').style.display = (role === 'volunteer') ? 'block' : 'none';
      document.getElementById('loginUsername').placeholder = role === 'admin' ? 'admin' : 'Your username';
    }

    function togglePasswordVisibility() {
      const pwd = document.getElementById('loginPassword');
      const btn = document.getElementById('eyeToggle');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        btn.textContent = '🙈';
      } else {
        pwd.type = 'password';
        btn.textContent = '👁';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('loginError');
      errDiv.style.display = 'none';
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Authenticating…';

      const payload = {
        username: document.getElementById('loginUsername').value.trim(),
        password: document.getElementById('loginPassword').value,
        role: selectedRole,
      };

      try {
        const res = await fetch('http://127.0.0.1:8000/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Login failed');
        }
        const data = await res.json();

        if (data.role === 'admin') {
          localStorage.setItem('dl_admin_token', data.token);
          localStorage.setItem('dl_admin_name', data.name || 'Admin');
          showToast('🔓 Admin access granted!', 'success');
          setTimeout(() => { window.location.href = 'admin.html'; }, 800);
        } else {
          // Volunteer
          localStorage.setItem('dl_vol_token', data.token);
          localStorage.setItem('dl_vol_username', data.username);
          localStorage.setItem('dl_vol_name', data.name || data.username);
          if (data.volunteer_id) localStorage.setItem('dl_vol_id', data.volunteer_id);
          showToast('✅ Welcome, ' + (data.name || data.username) + '!', 'success');
          setTimeout(() => { window.location.href = 'volunteer.html'; }, 800);
        }
      } catch (err) {
        errDiv.textContent = '❌ ' + err.message;
        errDiv.style.display = 'block';
        btn.disabled = false; btn.textContent = '🔐 Login';
      }
    });
  </script>
</body>
</html>
