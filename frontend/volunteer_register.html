<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Registration — DisasterLink</title>
  <meta name="description" content="Register as a DisasterLink volunteer responder to join the emergency response network." />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- Command Bar -->
  <nav class="cmdbar">
    <div class="cmdbar-brand">
      <span class="brand-dot"></span>
      DISASTERLINK
    </div>
    <div class="cmdbar-nav">
      <a href="index.html" style="color:var(--text-secondary);font-weight:600;"><span class="nav-icon">⬅️</span> Back</a>
    </div>
  </nav>

  <div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
    <div class="auth-wrap glass-panel" style="padding:2.5rem;max-width:480px;width:100%;">

      <!-- Header -->
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-size:2.8rem;margin-bottom:0.5rem;filter:drop-shadow(0 0 12px rgba(16,185,129,0.4));">🤝</div>
        <h1 style="font-size:1.6rem;font-weight:800;letter-spacing:0.02em;">Volunteer Registration</h1>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.4rem;">Join the DisasterLink emergency response network</p>
      </div>

      <!-- Register Form -->
      <form id="registerForm" novalidate style="display:flex;flex-direction:column;gap:1.25rem;">
        <div class="form-group" style="margin:0;">
          <label class="form-label">Full Name <span style="color:var(--danger);">*</span></label>
          <input type="text" class="form-control" id="regName" required placeholder="Your full name" />
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Username <span style="color:var(--danger);">*</span></label>
          <input type="text" class="form-control" id="regUsername" required placeholder="Choose a username" autocomplete="username" />
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Phone Number <span style="color:var(--danger);">*</span></label>
          <input type="tel" class="form-control" id="regPhone" required pattern="[0-9]{10}" maxlength="10" placeholder="10-digit phone number" />
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Primary Skill</label>
          <select class="form-control" id="regSkill">
            <option value="Medical">🩺 Medical / First Aid</option>
            <option value="Rescue">🦺 Search & Rescue</option>
            <option value="Logistics">📦 Logistics & Supply</option>
            <option value="Communication">📡 Communications</option>
            <option value="Other" selected>⚠️ Other General Help</option>
          </select>
        </div>
        <!-- GPS Location (optional) -->
        <div class="form-group" style="margin:0;">
          <label class="form-label">📍 My Location <span style="font-size:0.75rem;color:var(--text-muted);">(optional, used for smart dispatch)</span></label>
          <div style="display:flex;gap:0.75rem;align-items:center;">
            <button type="button" class="btn btn-ghost btn-sm" id="regGeoBtn" onclick="captureVolunteerLocation()" style="color:var(--info);white-space:nowrap;">
              📍 Share My Location
            </button>
            <span id="regGeoStatus" style="font-size:0.8rem;color:var(--text-muted);"></span>
          </div>
          <input type="hidden" id="regLat" />
          <input type="hidden" id="regLng" />
        </div>

        <div class="form-group" style="margin:0;">
          <label class="form-label">Password <span style="color:var(--danger);">*</span></label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="regPassword" required placeholder="Min. 6 characters" autocomplete="new-password" style="padding-right:3rem;" />
            <button type="button" onclick="togglePwd()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--text-secondary);padding:0.2rem;" id="regEye">👁</button>
          </div>
          <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.4rem;">Minimum 6 characters required.</div>
        </div>

        <div id="regError" style="display:none;color:var(--danger);font-size:0.85rem;text-align:center;background:rgba(239,68,68,0.1);padding:0.75rem;border-radius:var(--radius-sm);border:1px solid rgba(239,68,68,0.2);"></div>
        <div id="regSuccess" style="display:none;color:var(--success);font-size:0.85rem;text-align:center;background:rgba(16,185,129,0.1);padding:0.75rem;border-radius:var(--radius-sm);border:1px solid rgba(16,185,129,0.2);"></div>

        <button type="submit" class="btn btn-success btn-full btn-lg" id="regBtn" style="margin-top:0.25rem;font-size:1rem;">
          ✅ Create Account
        </button>
      </form>

      <div style="margin-top:1.5rem;text-align:center;font-size:0.87rem;color:var(--text-secondary);">
        Already registered? <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Login here →</a>
      </div>

    </div>
  </div>

  <div id="toastContainer"></div>
  <script src="script.js?v=2"></script>
  <script>
    function togglePwd() {
      const f = document.getElementById('regPassword');
      const b = document.getElementById('regEye');
      f.type = f.type === 'password' ? 'text' : 'password';
      b.textContent = f.type === 'password' ? '👁' : '🙈';
    }

    function captureVolunteerLocation() {
      const btn = document.getElementById('regGeoBtn');
      const status = document.getElementById('regGeoStatus');
      if (!navigator.geolocation) { status.textContent = 'Geolocation not supported'; return; }
      btn.disabled = true; btn.textContent = '📡 Locating…';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('regLat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('regLng').value = pos.coords.longitude.toFixed(6);
          btn.disabled = false; btn.textContent = '📍 Share My Location';
          status.innerHTML = `<span style="color:var(--success)">✅ ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}</span>`;
        },
        () => {
          btn.disabled = false; btn.textContent = '📍 Share My Location';
          status.innerHTML = '<span style="color:var(--danger)">❌ Could not get location</span>';
        },
        { timeout: 10000 }
      );
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('regError');
      const okDiv  = document.getElementById('regSuccess');
      errDiv.style.display = 'none';
      okDiv.style.display  = 'none';

      const name     = document.getElementById('regName').value.trim();
      const username = document.getElementById('regUsername').value.trim();
      const phone    = document.getElementById('regPhone').value.trim() || null;
      const password = document.getElementById('regPassword').value;
      const skill    = document.getElementById('regSkill').value || 'Other';

      if (!name || !username || !password || !phone) {
        errDiv.textContent = '❌ All fields are required.';
        errDiv.style.display = 'block';
        return;
      }
      
      const phoneRegex = /^\d{10}$/;
      if (!phoneRegex.test(phone)) {
        errDiv.textContent = '❌ Phone number must be exactly 10 digits.';
        errDiv.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errDiv.textContent = '❌ Password must be at least 6 characters.';
        errDiv.style.display = 'block';
        return;
      }

      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      try {
        const regLat = document.getElementById('regLat').value;
        const regLng = document.getElementById('regLng').value;

        const regPayload = {
          username, password, name, skill, phone, role: 'volunteer',
          latitude:  regLat ? parseFloat(regLat) : null,
          longitude: regLng ? parseFloat(regLng) : null,
        };

        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(regPayload),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Registration failed');
        }

        // Also update the volunteer record with GPS if we have it
        if (regLat && regLng) {
          try {
            // Quick login to get volunteer ID, then update via quick register
            const quickLoginRes = await fetch(`${API_BASE}/auth/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password, role: 'volunteer' }),
            });
            if (quickLoginRes.ok) {
              const qData = await quickLoginRes.json();
              if (qData.volunteer_id) {
                await fetch(`${API_BASE}/volunteers/${qData.volunteer_id}`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ assigned_report_id: null })
                });
              }
            }
          } catch(e) { /* GPS update is best-effort */ }
        }

        // Auto-login immediately
        const loginRes = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'volunteer' }),
        });
        
        if (loginRes.ok) {
          const authData = await loginRes.json();
          localStorage.setItem('dl_vol_token', authData.token);
          localStorage.setItem('dl_vol_name', authData.name);
          localStorage.setItem('dl_vol_id', authData.volunteer_id);
          
          okDiv.textContent = '✅ Account created! Entering portal…';
          okDiv.style.display = 'block';
          setTimeout(() => { window.location.href = 'volunteer.html'; }, 1500);
        } else {
          // Fallback if auto-login fails for some reason
          okDiv.textContent = '✅ Account created! Redirecting to login…';
          okDiv.style.display = 'block';
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        }

      } catch (err) {
        errDiv.textContent = '❌ ' + err.message;
        errDiv.style.display = 'block';
        btn.disabled = false; btn.textContent = '✅ Create Account';
      }
    });
  </script>
</body>
</html>
